<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            850: '#1f2937',
                            900: '#111827',
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

    <style>
        /* Base Resets & Font */
        body, html {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1f2937;
            -webkit-font-smoothing: antialiased;
        }

        .dark body, .dark html {
            background-color: #111827;
            color: #f3f4f6;
        }

        /* Hide scrollbar but keep functionality */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }

        /* Loader */
        #loading {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            font-weight: 500;
            color: #374151;
            transition: opacity 0.5s ease;
        }
        .dark #loading { background: #111827; color: #d1d5db; }

        /* Markdown Custom Overrides for better contrast */
        .prose pre { background-color: #1f2937 !important; color: #e5e7eb !important; border-radius: 0.75rem; }
        .dark .prose pre { background-color: #030712 !important; }
        .prose p:last-child { margin-bottom: 0; }

        /* Mobile Safe Area & Input Adjustments */
        .input-safe-area { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
        textarea { resize: none; overflow-y: hidden; max-height: 200px; }
        
        /* Cursor Blinking Animation */
        .typing-cursor::after {
            content: '▋';
            animation: blink 1s step-start infinite;
            color: #3b82f6;
            margin-left: 2px;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body class="min-h-screen text-gray-800 dark:text-gray-200 transition-colors duration-200">

    <div id="loading">
        <i class="fa-solid fa-circle-notch fa-spin mr-3 text-blue-500"></i> Loading App...
    </div>

    <div id="app" class="flex w-full min-h-screen relative opacity-0 transition-opacity duration-300">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden transition-opacity"></div>

        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-gray-50 dark:bg-gray-950 border-r border-gray-200 dark:border-gray-800 transform -translate-x-full md:translate-x-0 md:static md:inset-auto md:w-64 transition-transform duration-300 flex flex-col h-full">
            
            <div class="p-4">
                <button onclick="app.createNewChat()" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-2.5 px-4 rounded-xl font-medium transition-colors">
                    <i class="fa-solid fa-plus"></i> New Chat
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-3 space-y-1" id="chat-list">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-800 space-y-2">
                <button onclick="app.toggleTheme()" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors text-sm font-medium text-gray-700 dark:text-gray-300">
                    <i id="theme-icon" class="fa-solid fa-moon w-5"></i> <span id="theme-text">Dark Mode</span>
                </button>
                <button onclick="app.openSettings()" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors text-sm font-medium text-gray-700 dark:text-gray-300">
                    <i class="fa-solid fa-gear w-5"></i> Settings
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-h-screen w-full bg-white dark:bg-gray-900">
            
            <header class="sticky top-0 z-30 flex items-center justify-between p-4 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 md:hidden">
                <button onclick="app.toggleSidebar()" class="text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:white text-xl">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h1 class="font-semibold truncate max-w-[200px]" id="mobile-header-title">New Chat</h1>
                <div class="w-6"></div> </header>

            <div id="chat-container" class="flex-1 w-full max-w-4xl mx-auto flex flex-col pt-6 pb-40 px-4 md:px-8 space-y-6 overflow-y-auto h-0">
                <div id="empty-state" class="m-auto flex flex-col items-center justify-center text-center opacity-50 mt-32">
                    <i class="fa-solid fa-sparkles text-5xl mb-4 text-blue-500"></i>
                    <h2 class="text-2xl font-semibold mb-2">How can I help you today?</h2>
                    <p class="text-sm max-w-sm">Enter a prompt below to start interacting with the AI.</p>
                </div>
                </div>

            <div class="fixed bottom-0 left-0 md:left-64 right-0 bg-gradient-to-t from-white via-white to-transparent dark:from-gray-900 dark:via-gray-900 dark:to-transparent z-20 pt-10 input-safe-area">
                <div class="max-w-4xl mx-auto px-4 w-full">
                    <div class="relative bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-3xl shadow-sm focus-within:ring-2 focus-within:ring-blue-500/50 transition-all flex items-end mb-4">
                        <textarea id="chat-input" rows="1" placeholder="Type a message..." class="w-full bg-transparent text-gray-900 dark:text-white px-5 py-3.5 focus:outline-none placeholder-gray-500 dark:placeholder-gray-400 max-h-[200px] overflow-y-auto"></textarea>
                        <button id="send-btn" onclick="app.sendMessage()" class="p-3 m-1 text-gray-400 hover:text-blue-500 dark:hover:text-blue-400 transition-colors flex-shrink-0 disabled:opacity-50 disabled:cursor-not-allowed">
                            <i class="fa-solid fa-paper-plane text-lg"></i>
                        </button>
                    </div>
                    <div class="text-center text-xs text-gray-400 dark:text-gray-500 mb-2">
                        AI can make mistakes. Consider verifying important information.
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black/60 z-[100] hidden items-center justify-center px-4 backdrop-blur-sm transition-opacity">
        <div class="bg-white dark:bg-gray-850 w-full max-w-md rounded-2xl shadow-2xl p-6 transform transition-all scale-95 opacity-0" id="settings-content">
            <div class="flex justify-between items-center mb-6 border-b border-gray-200 dark:border-gray-700 pb-3">
                <h2 class="text-xl font-semibold"><i class="fa-solid fa-sliders mr-2 text-blue-500"></i> Settings</h2>
                <button onclick="app.closeSettings()" class="text-gray-500 hover:text-gray-800 dark:hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">OpenRouter API Key <span class="text-red-500">*</span></label>
                    <input type="password" id="setting-api-key" placeholder="sk-or-v1-..." class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Model ID</label>
                    <input type="text" id="setting-model" placeholder="deepseek/deepseek-r1:free" value="deepseek/deepseek-r1:free" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">System Prompt</label>
                    <textarea id="setting-system" rows="3" class="w-full px-3 py-2 bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 placeholder-gray-400" placeholder="You are a helpful AI assistant..."></textarea>
                </div>
            </div>

            <div class="mt-6 flex justify-end gap-3">
                <button onclick="app.closeSettings()" class="px-4 py-2 text-sm font-medium text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-lg transition-colors">Cancel</button>
                <button onclick="app.saveSettings()" class="px-4 py-2 text-sm font-medium bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        const app = {
            state: {
                chats: [],
                currentChatId: null,
                settings: {
                    apiKey: '',
                    model: 'deepseek/deepseek-r1:free',
                    systemPrompt: 'You are a helpful AI assistant.',
                    darkMode: false
                },
                isStreaming: false
            },

            // --- INIT ---
            init() {
                try {
                    this.loadState();
                    this.applyTheme();
                    this.setupEventListeners();
                    
                    if (this.state.chats.length === 0) {
                        this.createNewChat();
                    } else {
                        if (!this.state.currentChatId) {
                            this.state.currentChatId = this.state.chats[0].id;
                        }
                        this.renderChatList();
                        this.renderCurrentChat();
                    }

                    // Remove loading screen safely
                    setTimeout(() => {
                        const loader = document.getElementById('loading');
                        const appUI = document.getElementById('app');
                        if(loader) {
                            loader.style.opacity = '0';
                            setTimeout(() => loader.remove(), 500);
                        }
                        if(appUI) appUI.style.opacity = '1';
                    }, 300);

                } catch (error) {
                    console.error("Initialization Error:", error);
                    alert("A fatal error occurred during initialization. Check console.");
                }
            },

            // --- STORAGE ---

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minimal Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div id="app" class="p-10 bg-white rounded shadow-xl">
        <h1 class="text-2xl font-bold">App Loaded!</h1>
        <p id="status" class="mt-4 text-gray-600">Checking API access...</p>
    </div>

    <script>
        // Check if environment allows basic fetches
        document.getElementById('status').innerText = "JavaScript is active.";
        console.log("App script running correctly.");
    </script>
</body>
</html>
